name: catat_duit
description: Aplikasi manajemen keuangan personal — offline-first, Indonesia-first.
publish_to: "none"
version: 0.2.2+6

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # State management
  flutter_riverpod: ^2.5.1

  # Local database (offline-first)
  sqflite: ^2.3.3
  path_provider: ^2.1.3
  path: ^1.9.0

  # Charts & UI
  fl_chart: ^0.68.0
  intl: ^0.19.0
  google_fonts: ^6.2.1

  # OCR (offline, on-device)
  google_mlkit_text_recognition: ^0.13.0
  image_picker: ^1.1.2

  # Notifications (offline reminders)
  flutter_local_notifications: ^17.2.1
  timezone: ^0.9.4
  flutter_timezone: ^3.0.1
  permission_handler: ^11.3.1
  app_settings: ^5.1.1
  device_info_plus: ^10.1.2

  # Storage
  shared_preferences: ^2.2.3

  # Navigation
  go_router: ^14.2.0

  # Animations
  flutter_animate: ^4.5.0

  # Export
  pdf: ^3.11.0
  printing: ^5.13.0
  share_plus: ^9.0.0

  # Utility
  uuid: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/keywords.json
